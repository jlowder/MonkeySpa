  <title>Quantum Pass | Secure Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(20, 25, 35, 0.6);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f3f8;
      --text-secondary: #8b9bb4;
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.5);
      --accent-hover: #818cf8;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
    }

    .pw-container {
      max-width: 500px;
      width: 90%;
      margin: 2rem auto;
      padding: 2.5rem;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .app-header { text-align: center; margin-bottom: 2rem; }
    .app-header h1 {
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, #f0f3f8 0%, #8b9bb4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .app-header p { color: var(--text-secondary); font-size: 0.95rem; }

    .display-section {
      position: relative; background: rgba(0, 0, 0, 0.3); padding: 1.5rem;
      border-radius: 16px; margin-bottom: 2rem; display: flex; align-items: center;
      justify-content: space-between; border: 1px solid var(--panel-border);
      transition: all 0.3s ease;
    }
    .display-section:hover { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 0 20px var(--accent-glow); }

    .password-text {
      font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700;
      letter-spacing: 2px; color: var(--text-primary); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .password-text.placeholder { color: var(--text-secondary); opacity: 0.5; }

    .copy-btn {
      background: transparent; border: none; color: var(--accent-color); cursor: pointer;
      padding: 0.5rem; border-radius: 8px; transition: all 0.2s ease; display: flex;
      align-items: center; justify-content: center;
    }
    .copy-btn:hover { background: rgba(99, 102, 241, 0.1); color: var(--accent-hover); transform: scale(1.05); }
    .copy-btn:active { transform: scale(0.95); }

    .controls-section { display: flex; flex-direction: column; gap: 1.5rem; }

    .length-control { display: flex; flex-direction: column; gap: 1rem; }
    .length-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); font-weight: 500; }
    .length-value { color: var(--accent-color); font-size: 1.25rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    input[type=range]::-webkit-slider-thumb {
      height: 20px; width: 20px; border-radius: 50%; background: var(--accent-color); cursor: pointer;
      -webkit-appearance: none; margin-top: -7px; box-shadow: 0 0 10px var(--accent-glow); transition: all 0.2s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); background: var(--accent-hover); }

    .options-group {
      display: flex; flex-direction: column; gap: 1rem; background: rgba(0,0,0,0.15);
      padding: 1.25rem; border-radius: 12px; border: 1px solid var(--panel-border);
    }
    .option-item { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .option-label { color: var(--text-primary); font-weight: 500; user-select: none; }

    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255, 255, 255, 0.1); transition: .3s; border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
      background-color: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .toggle-slider { background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-glow); }
    input:checked + .toggle-slider:before { transform: translateX(20px); }

    .generate-btn {
      margin-top: 1rem; width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
      color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
    .generate-btn:active { transform: translateY(1px); }
    .generate-icon { transition: transform 0.3s ease; }
    .generate-btn:hover .generate-icon { transform: rotate(180deg); }

    .strength-meter { margin-top: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--panel-border); }
    .strength-header { display: flex; justify-content: space-between; text-transform: uppercase; font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; letter-spacing: 1px; margin-bottom: 0.75rem; }
    .strength-text { font-weight: 700; }
    .strength-text.weak { color: var(--danger-color); }
    .strength-text.medium { color: var(--warning-color); }
    .strength-text.strong { color: var(--success-color); }
    .strength-bars { display: flex; gap: 8px; }
    .bar { flex: 1; height: 6px; border-radius: 4px; background: rgba(255,255,255,0.1); transition: all 0.3s ease; }
    .bar.active.weak { background: var(--danger-color); box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
    .bar.active.medium { background: var(--warning-color); box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
    .bar.active.strong { background: var(--success-color); box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
  </style>
</head>
<body>
  <div class="pw-container">
    <header class="app-header">
      <h1>Quantum Pass</h1>
      <p>Generate highly secure passwords instantly.</p>
    </header>

    <div class="display-section">
      <div id="passwordDisplay" class="password-text"></div>
      <button id="copyBtn" class="copy-btn" aria-label="Copy password">
        <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        <svg id="checkIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--success-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </button>
    </div>

    <div class="controls-section">
      <div class="length-control">
        <div class="length-header">
          <span>Character Length</span>
          <span id="lengthValue" class="length-value">16</span>
        </div>
        <input type="range" id="lengthSlider" min="6" max="32" value="16" />
      </div>

      <div class="options-group">
        <label class="option-item">
          <span class="option-label">Include Uppercase Letters</span>
          <div class="toggle-switch">
            <input type="checkbox" id="optUppercase" checked />
            <span class="toggle-slider"></span>
          </div>
        </label>
        <label class="option-item">
          <span class="option-label">Include Lowercase Letters</span>
          <div class="toggle-switch">
            <input type="checkbox" id="optLowercase" checked />
            <span class="toggle-slider"></span>
          </div>
        </label>
        <label class="option-item">
          <span class="option-label">Include Numbers</span>
          <div class="toggle-switch">
            <input type="checkbox" id="optNumbers" checked />
            <span class="toggle-slider"></span>
          </div>
        </label>
        <label class="option-item">
          <span class="option-label">Include Symbols</span>
          <div class="toggle-switch">
            <input type="checkbox" id="optSymbols" checked />
            <span class="toggle-slider"></span>
          </div>
        </label>
      </div>

      <div class="strength-meter">
        <div class="strength-header">
          <span>Strength</span>
          <span id="strengthText" class="strength-text"></span>
        </div>
        <div class="strength-bars">
           <div class="bar" id="bar1"></div>
           <div class="bar" id="bar2"></div>
           <div class="bar" id="bar3"></div>
           <div class="bar" id="bar4"></div>
        </div>
      </div>

      <button id="generateBtn" class="generate-btn">
        <svg class="generate-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span>Generate Password</span>
      </button>
    </div>
  </div>

  <script>
    const CHAR_SETS = {
      uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lowercase: 'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    let currentPassword = '';

    const els = {
      display: document.getElementById('passwordDisplay'),
      slider: document.getElementById('lengthSlider'),
      lengthValue: document.getElementById('lengthValue'),
      optUppercase: document.getElementById('optUppercase'),
      optLowercase: document.getElementById('optLowercase'),
      optNumbers: document.getElementById('optNumbers'),
      optSymbols: document.getElementById('optSymbols'),
      generateBtn: document.getElementById('generateBtn'),
      copyBtn: document.getElementById('copyBtn'),
      copyIcon: document.getElementById('copyIcon'),
      checkIcon: document.getElementById('checkIcon'),
      strengthText: document.getElementById('strengthText'),
      bars: [
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3'),
        document.getElementById('bar4')
      ]
    };

    function updateSliderBackground() {
      const val = els.slider.value;
      const min = els.slider.min ? els.slider.min : 6;
      const max = els.slider.max ? els.slider.max : 32;
      const percentage = (val - min) / (max - min) * 100;
      els.slider.style.background = `linear-gradient(to right, var(--accent-color) ${percentage}%, rgba(255, 255, 255, 0.1) ${percentage}%)`;
    }

    function calculateStrength(password) {
      let score = 0;
      if (password.length > 0) {
        if (password.length >= 8) score += 1;
        if (password.length >= 12) score += 1;
        if (password.length >= 16) score += 1;
        
        let variety = 0;
        if (/[A-Z]/.test(password)) variety += 1;
        if (/[a-z]/.test(password)) variety += 1;
        if (/[0-9]/.test(password)) variety += 1;
        if (/[^a-zA-Z0-9]/.test(password)) variety += 1;
        
        score += variety - 1; 
      }
      
      if (score <= 2) return { label: 'Weak', class: 'weak', bars: 1 };
      if (score <= 4) return { label: 'Medium', class: 'medium', bars: 2 };
      if (score <= 5) return { label: 'Good', class: 'medium', bars: 3 };
      return { label: 'Strong', class: 'strong', bars: 4 };
    }

    function updateStrengthMeter(password) {
      const strength = calculateStrength(password);
      els.strengthText.textContent = strength.label;
      els.strengthText.className = `strength-text ${strength.class}`;
      
      els.bars.forEach((bar, index) => {
        bar.className = 'bar';
        if (index < strength.bars) {
          bar.classList.add('active', strength.class);
        }
      });
    }

    function generatePassword() {
      const length = parseInt(els.slider.value);
      const options = {
        uppercase: els.optUppercase.checked,
        lowercase: els.optLowercase.checked,
        numbers: els.optNumbers.checked,
        symbols: els.optSymbols.checked
      };

      // Prevent unchecking all options
      if (!options.uppercase && !options.lowercase && !options.numbers && !options.symbols) {
        els.optLowercase.checked = true;
        options.lowercase = true;
      }

      let charset = '';
      if (options.lowercase) charset += CHAR_SETS.lowercase;
      if (options.uppercase) charset += CHAR_SETS.uppercase;
      if (options.numbers) charset += CHAR_SETS.numbers;
      if (options.symbols) charset += CHAR_SETS.symbols;

      let newPassword = '';
      const requiredChars = [];
      if (options.lowercase) requiredChars.push(CHAR_SETS.lowercase[Math.floor(Math.random() * CHAR_SETS.lowercase.length)]);
      if (options.uppercase) requiredChars.push(CHAR_SETS.uppercase[Math.floor(Math.random() * CHAR_SETS.uppercase.length)]);
      if (options.numbers) requiredChars.push(CHAR_SETS.numbers[Math.floor(Math.random() * CHAR_SETS.numbers.length)]);
      if (options.symbols) requiredChars.push(CHAR_SETS.symbols[Math.floor(Math.random() * CHAR_SETS.symbols.length)]);
      
      for (const char of requiredChars) {
        newPassword += char;
      }
      
      const randomBuffer = new Uint32Array(length > requiredChars.length ? length - requiredChars.length : 0);
      crypto.getRandomValues(randomBuffer);
      for (let i = 0; i < randomBuffer.length; i++) {
        newPassword += charset[randomBuffer[i] % charset.length];
      }
      
      // Shuffle
      newPassword = newPassword.split('').sort(() => 0.5 - Math.random()).join('');
      
      // If length was lower than required chars limit
      if (newPassword.length > length) {
          newPassword = newPassword.substring(0, length);
      }

      currentPassword = newPassword;
      els.display.textContent = currentPassword;
      els.display.classList.remove('placeholder');
      updateStrengthMeter(currentPassword);
    }

    async function copyToClipboard() {
      if (!currentPassword) return;
      try {
        await navigator.clipboard.writeText(currentPassword);
        els.copyIcon.style.display = 'none';
        els.checkIcon.style.display = 'block';
        setTimeout(() => {
          els.copyIcon.style.display = 'block';
          els.checkIcon.style.display = 'none';
        }, 2000);
      } catch (err) {
        console.error('Failed to copy', err);
      }
    }

    function ensureAtLeastOneOption(e) {
      if (!els.optUppercase.checked && !els.optLowercase.checked && 
          !els.optNumbers.checked && !els.optSymbols.checked) {
        e.target.checked = true;
      } else {
        generatePassword();
      }
    }

    // Event Listeners
    els.slider.addEventListener('input', (e) => {
      els.lengthValue.textContent = e.target.value;
      updateSliderBackground();
      generatePassword();
    });

    els.optUppercase.addEventListener('change', ensureAtLeastOneOption);
    els.optLowercase.addEventListener('change', ensureAtLeastOneOption);
    els.optNumbers.addEventListener('change', ensureAtLeastOneOption);
    els.optSymbols.addEventListener('change', ensureAtLeastOneOption);

    els.generateBtn.addEventListener('click', generatePassword);
    els.copyBtn.addEventListener('click', copyToClipboard);

    // Initial setup
    updateSliderBackground();
    generatePassword();
  </script>
</body>
</html>
