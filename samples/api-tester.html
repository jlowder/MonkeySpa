<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester Pro</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
            --input-bg: #f9f9f9;
            --success-color: #00b894;
            --error-color: #d63031;
            --warning-color: #fdcb6e;
            --code-bg: #2d3436;
            --code-text: #dfe6e9;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --border-color: #404040;
            --input-bg: #333333;
            --code-bg: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* URL Bar */
        .url-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select#method {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            font-weight: 700;
            width: 100px;
        }

        input#url {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-send {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #7f8c8d;
            position: relative;
        }

        .tab.active {
            color: var(--primary-color);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Headers Editor */
        .header-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .header-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .btn-remove {
            color: var(--error-color);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        .btn-add {
            color: var(--primary-color);
            background: none;
            border: 1px dashed var(--primary-color);
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }

        /* Request Body */
        textarea#body {
            width: 100%;
            height: 200px;
            background: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        .body-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn-small {
            padding: 4px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
        }

        /* Response View */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-left: auto;
        }

        .status-ok { background: rgba(0, 184, 148, 0.1); color: var(--success-color); }
        .status-error { background: rgba(214, 48, 49, 0.1); color: var(--error-color); }

        .response-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .response-container {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 20px;
            border-radius: 8px;
            overflow: auto;
            max-height: 600px;
            position: relative;
        }

        pre {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* History */
        .history-list {
            list-style: none;
            margin-top: 20px;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .hist-method {
            font-weight: 800;
            font-size: 0.75rem;
            min-width: 50px;
        }

        .hist-url {
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* JSON Highlighting */
        .json-key { color: #81ecec; }
        .json-string { color: #fab1a0; }
        .json-number { color: #55efc4; }
        .json-boolean { color: #74b9ff; }
        .json-null { color: #a29bfe; }

        /* CORS Banner */
        .cors-banner {
            background: var(--warning-color);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .hidden { display: none !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <h1><i class="fas fa-rocket"></i> API Tester Pro</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="cors-banner">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Note: Browser CORS policy might block requests. Use a CORS proxy if needed.</span>
        </div>

        <div class="main-grid">
            <!-- Request Panel -->
            <div class="card">
                <div class="section-title">
                    <i class="fas fa-paper-plane"></i> Request
                </div>

                <div class="url-bar">
                    <select id="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                        <option value="PATCH">PATCH</option>
                    </select>
                    <input type="text" id="url" placeholder="https://api.example.com/data" value="https://jsonplaceholder.typicode.com/posts/1">
                    <button class="btn-send" onclick="sendRequest()">SEND</button>
                </div>

                <div class="tabs">
                    <div class="tab active" onclick="switchTab('request', 'body-tab', this)">Body</div>
                    <div class="tab" onclick="switchTab('request', 'headers-tab', this)">Headers</div>
                    <div class="tab" onclick="switchTab('request', 'history-tab', this)">History</div>
                </div>

                <div id="body-tab" class="tab-content active">
                    <textarea id="body" placeholder='{ "key": "value" }'></textarea>
                    <div class="body-actions">
                        <button class="btn-small" onclick="beautifyJSON()">Beautify</button>
                    </div>
                </div>

                <div id="headers-tab" class="tab-content">
                    <div id="headers-list">
                        <!-- Header rows inserted here -->
                    </div>
                    <button class="btn-add" onclick="addHeaderRow()">
                        <i class="fas fa-plus"></i> Add Header
                    </button>
                </div>

                <div id="history-tab" class="tab-content">
                    <div id="history-list" class="history-list">
                        <!-- History items here -->
                    </div>
                    <button class="btn-small" style="width: 100%; margin-top: 10px;" onclick="clearHistory()">Clear History</button>
                </div>
            </div>

            <!-- Response Panel -->
            <div class="card">
                <div class="section-title">
                    <i class="fas fa-reply"></i> Response
                    <span id="res-status" class="status-badge hidden"></span>
                </div>

                <div class="response-meta">
                    <span id="res-time"><i class="fas fa-clock"></i> -- ms</span>
                    <span id="res-size"><i class="fas fa-database"></i> -- KB</span>
                </div>

                <div class="tabs">
                    <div class="tab active" onclick="switchTab('response', 'res-body-tab', this)">Body</div>
                    <div class="tab" onclick="switchTab('response', 'res-headers-tab', this)">Headers</div>
                    <div class="tab" onclick="switchTab('response', 'res-raw-tab', this)">Raw</div>
                </div>

                <div id="res-body-tab" class="tab-content active">
                    <div class="response-container">
                        <button class="btn-copy" onclick="copyResponse()"><i class="far fa-copy"></i></button>
                        <pre id="response-content">Waiting for request...</pre>
                    </div>
                </div>

                <div id="res-headers-tab" class="tab-content">
                    <div class="response-container">
                        <pre id="response-headers">No headers yet...</pre>
                    </div>
                </div>

                <div id="res-raw-tab" class="tab-content">
                    <div class="response-container">
                        <pre id="response-raw">No raw data yet...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('api_history') || '[]');
        let currentTheme = localStorage.getItem('api_theme') || 'light';
        document.body.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        // Initial Header
        addHeaderRow('Content-Type', 'application/json');

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', currentTheme);
            localStorage.setItem('api_theme', currentTheme);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.querySelector('.theme-toggle i');
            icon.className = currentTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }

        function switchTab(group, tabId, el) {
            const parent = el.parentElement;
            parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            const container = parent.parentElement;
            container.querySelectorAll('.tab-content').forEach(c => {
                c.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
        }

        function addHeaderRow(key = '', value = '') {
            const list = document.getElementById('headers-list');
            const row = document.createElement('div');
            row.className = 'header-row';
            row.innerHTML = `
                <input type="text" placeholder="Key" value="${key}">
                <input type="text" placeholder="Value" value="${value}">
                <button class="btn-remove" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
            list.appendChild(row);
        }

        function beautifyJSON() {
            const textarea = document.getElementById('body');
            try {
                const obj = JSON.parse(textarea.value);
                textarea.value = JSON.stringify(obj, null, 2);
            } catch(e) {
                alert('Invalid JSON');
            }
        }

        async function sendRequest() {
            const url = document.getElementById('url').value;
            const method = document.getElementById('method').value;
            const bodyText = document.getElementById('body').value;
            const sendBtn = document.querySelector('.btn-send');
            const statusBadge = document.getElementById('res-status');

            if(!url) return alert('Please enter a URL');

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const headers = {};
            document.querySelectorAll('.header-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if(inputs[0].value) headers[inputs[0].value] = inputs[1].value;
            });

            const startTime = performance.now();
            try {
                const options = { method, headers };
                if (['POST', 'PUT', 'PATCH'].includes(method)) options.body = bodyText;

                const response = await fetch(url, options);
                const endTime = performance.now();
                const duration = Math.round(endTime - startTime);

                const data = await response.text();
                const size = (new Blob([data]).size / 1024).toFixed(2);

                displayResponse(response, data, duration, size);
                addToHistory(method, url);
            } catch(e) {
                const endTime = performance.now();
                displayError(e, Math.round(endTime - startTime));
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = 'SEND';
            }
        }

        function displayResponse(res, data, time, size) {
            const statusBadge = document.getElementById('res-status');
            statusBadge.className = `status-badge ${res.ok ? 'status-ok' : 'status-error'}`;
            statusBadge.textContent = `${res.status} ${res.statusText}`;
            statusBadge.classList.remove('hidden');

            document.getElementById('res-time').innerHTML = `<i class="fas fa-clock"></i> ${time} ms`;
            document.getElementById('res-size').innerHTML = `<i class="fas fa-database"></i> ${size} KB`;

            // Format Body
            const content = document.getElementById('response-content');
            try {
                const json = JSON.parse(data);
                content.innerHTML = highlightJSON(json);
            } catch(e) {
                content.textContent = data;
            }

            // Headers
            let headerText = '';
            res.headers.forEach((v, k) => headerText += `${k}: ${v}\n`);
            document.getElementById('response-headers').textContent = headerText || 'No headers returned';

            // Raw
            document.getElementById('response-raw').textContent = data;
        }

        function displayError(err, time) {
            const statusBadge = document.getElementById('res-status');
            statusBadge.className = 'status-badge status-error';
            statusBadge.textContent = 'Error';
            statusBadge.classList.remove('hidden');

            document.getElementById('res-time').innerHTML = `<i class="fas fa-clock"></i> ${time} ms`;
            document.getElementById('response-content').innerHTML = `<span style="color:var(--error-color)">${err.message}</span>`;
            document.getElementById('response-headers').textContent = 'N/A';
            document.getElementById('response-raw').textContent = err.stack;
        }

        function highlightJSON(json) {
            let str = JSON.stringify(json, null, 2);
            str = str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return str.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function copyResponse() {
            const content = document.getElementById('response-content').innerText;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i>', 2000);
            });
        }

        function addToHistory(method, url) {
            history = history.filter(h => h.url !== url || h.method !== method);
            history.unshift({ method, url, time: new Date().toLocaleTimeString() });
            history = history.slice(0, 20);
            localStorage.setItem('api_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map(h => `
                <div class="history-item" onclick="loadHistory('${h.method}', '${h.url}')">
                    <span class="hist-method" style="color: ${getMethodColor(h.method)}">${h.method}</span>
                    <span class="hist-url">${h.url}</span>
                </div>
            `).join('') || '<div style="text-align:center;padding:20px;color:#7f8c8d">No history yet</div>';
        }

        function loadHistory(method, url) {
            document.getElementById('method').value = method;
            document.getElementById('url').value = url;
            switchTab('request', 'body-tab', document.querySelector('.tab'));
        }

        function clearHistory() {
            history = [];
            localStorage.setItem('api_history', '[]');
            renderHistory();
        }

        function getMethodColor(m) {
            const colors = { GET: '#00b894', POST: '#fdcb6e', PUT: '#0984e3', DELETE: '#d63031', PATCH: '#6c5ce7' };
            return colors[m] || '#636e72';
        }

        // Initialize history
        renderHistory();
    </script>
</body>
</html>
