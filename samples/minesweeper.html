<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 90vw;
            width: 95%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .difficulty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .difficulty-selector label {
            font-weight: bold;
            color: #555;
        }

        #difficulty {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #difficulty:hover {
            border-color: #764ba2;
        }

        #difficulty:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .custom-difficulty-form {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f0f3f7;
            border-radius: 10px;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .custom-difficulty-form.active {
            display: flex;
        }

        .custom-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-input-group label {
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
        }

        .custom-input-group input {
            width: 60px;
            padding: 5px;
            border: 2px solid #667eea;
            border-radius: 5px;
            text-align: center;
        }

        .btn-small {
            padding: 5px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        .game-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: #f5f5f5;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 2px;
        }

        .info-value {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            background: #222;
            color: #ff4757;
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 60px;
        }

        .smiley-btn {
            font-size: 2rem;
            background: #eee;
            border: 3px solid;
            border-color: #fff #bbb #bbb #fff;
            padding: 5px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            transition: all 0.1s;
        }

        .smiley-btn:active {
            border-color: #bbb #fff #fff #bbb;
            transform: translateY(1px);
        }

        .game-board {
            display: grid;
            border: 8px solid #d1d8e0;
            border-radius: 4px;
            margin: 20px auto;
            justify-content: center;
            user-select: none;
            overflow: auto;
            max-width: 100%;
            background: #d1d8e0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .cell {
            width: 32px;
            height: 32px;
            background: #ced6e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border: 3px solid;
            border-color: #f1f2f6 #747d8c #747d8c #f1f2f6;
            box-sizing: border-box;
        }

        .cell:active:not(.revealed):not(.flagged) {
            border: none;
            background: #a4b0be;
        }

        .cell.revealed {
            background: #a4b0be;
            cursor: default;
            border: 1px solid #747d8c;
        }

        .cell.flagged::before {
            content: '🚩';
            font-size: 1rem;
        }

        .cell.mine {
            background: #ff4757;
            color: white;
        }

        .cell.mine::before {
            content: '💣';
            font-size: 1.2rem;
        }

        .cell.exploded {
            background: #ff6b6b !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Number colors */
        .cell[data-number="1"] { color: #1e90ff; }
        .cell[data-number="2"] { color: #2ecc71; }
        .cell[data-number="3"] { color: #e74c3c; }
        .cell[data-number="4"] { color: #9b59b6; }
        .cell[data-number="5"] { color: #f39c12; }
        .cell[data-number="6"] { color: #00bcd4; }
        .cell[data-number="7"] { color: #795548; }
        .cell[data-number="8"] { color: #9e9e9e; }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: #2ecc71;
            color: white;
        }

        .message.game-over {
            background: #ff4757;
            color: white;
        }

        .message.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 800px) {
            .game-container {
                padding: 15px;
                width: 100%;
                max-width: 100vw;
                border-radius: 0;
            }
            
            h1 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .game-info {
                padding: 10px;
                width: 100%;
                justify-content: space-between;
            }
            
            .cell {
                width: 28px;
                height: 28px;
                font-size: 1rem;
                border-width: 2px;
            }

            .info-value {
                font-size: 1.2rem;
                min-width: 50px;
            }

            .smiley-btn {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }

            .custom-difficulty-form {
                flex-direction: column;
                align-items: stretch;
            }

            .custom-input-group {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Minesweeper</h1>
        
        <div class="controls">
            <div class="difficulty-selector">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy (9x9, 10 mines)</option>
                    <option value="medium">Medium (16x16, 40 mines)</option>
                    <option value="hard">Hard (30x16, 99 mines)</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            
            <div id="custom-form" class="custom-difficulty-form">
                <div class="custom-input-group">
                    <label for="custom-rows">Rows:</label>
                    <input type="number" id="custom-rows" min="5" max="50" value="16">
                </div>
                <div class="custom-input-group">
                    <label for="custom-cols">Cols:</label>
                    <input type="number" id="custom-cols" min="5" max="50" value="30">
                </div>
                <div class="custom-input-group">
                    <label for="custom-mines">Mines:</label>
                    <input type="number" id="custom-mines" min="1" max="999" value="99">
                </div>
                <button id="apply-custom-btn" class="btn-small">Apply</button>
            </div>

            <div class="game-info">
                <div class="info-item">
                    <span class="info-label">Mines</span>
                    <span id="mine-count" class="info-value">000</span>
                </div>
                <button id="new-game-btn" class="smiley-btn">😊</button>
                <div class="info-item">
                    <span class="info-label">Time</span>
                    <span id="timer" class="info-value">000</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Best</span>
                    <span id="best-time" class="info-value">---</span>
                </div>
            </div>
        </div>
        
        <div id="game-board" class="game-board"></div>
        
        <div id="message" class="message hidden"></div>
    </div>

    <script>
        class Minesweeper {
            constructor() {
                this.board = document.getElementById('game-board');
                this.mineCountDisplay = document.getElementById('mine-count');
                this.timerDisplay = document.getElementById('timer');
                this.bestTimeDisplay = document.getElementById('best-time');
                this.messageDisplay = document.getElementById('message');
                this.newGameBtn = document.getElementById('new-game-btn');
                this.difficultySelect = document.getElementById('difficulty');
                this.customForm = document.getElementById('custom-form');
                this.applyCustomBtn = document.getElementById('apply-custom-btn');
                
                this.difficulties = {
                    easy: { rows: 9, cols: 9, mines: 10 },
                    medium: { rows: 16, cols: 16, mines: 40 },
                    hard: { rows: 16, cols: 30, mines: 99 }
                };
                
                this.currentDifficulty = 'easy';
                this.grid = [];
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.flags = 0;
                this.timer = 0;
                this.startTime = null;
                this.timerInterval = null;
                
                this.setupEventListeners();
                this.updateBestTimeDisplay();
                this.startNewGame();
            }

            updateBestTimeDisplay() {
                if (this.currentDifficulty === 'custom') {
                    this.bestTimeDisplay.textContent = '---';
                    return;
                }
                const bestTimes = JSON.parse(localStorage.getItem('minesweeper-best-times') || '{}');
                const best = bestTimes[this.currentDifficulty];
                this.bestTimeDisplay.textContent = best ? best.toString().padStart(3, '0') : '---';
            }

            saveBestTime(time) {
                if (this.currentDifficulty === 'custom') return false;
                const bestTimes = JSON.parse(localStorage.getItem('minesweeper-best-times') || '{}');
                if (!bestTimes[this.currentDifficulty] || time < bestTimes[this.currentDifficulty]) {
                    bestTimes[this.currentDifficulty] = time;
                    localStorage.setItem('minesweeper-best-times', JSON.stringify(bestTimes));
                    this.updateBestTimeDisplay();
                    return true;
                }
                return false;
            }
            
            setupEventListeners() {
                this.newGameBtn.addEventListener('click', () => this.startNewGame());
                this.difficultySelect.addEventListener('change', (e) => {
                    this.currentDifficulty = e.target.value;
                    if (this.currentDifficulty === 'custom') {
                        this.customForm.classList.add('active');
                    } else {
                        this.customForm.classList.remove('active');
                        this.startNewGame();
                    }
                });
                this.applyCustomBtn.addEventListener('click', () => {
                    const rows = parseInt(document.getElementById('custom-rows').value);
                    const cols = parseInt(document.getElementById('custom-cols').value);
                    const mines = parseInt(document.getElementById('custom-mines').value);

                    if (isNaN(rows) || isNaN(cols) || isNaN(mines)) return;

                    // Sanitize
                    const safeRows = Math.min(Math.max(rows, 5), 50);
                    const safeCols = Math.min(Math.max(cols, 5), 50);
                    const safeMines = Math.min(Math.max(mines, 1), (safeRows * safeCols) - 9);

                    this.difficulties.custom = { rows: safeRows, cols: safeCols, mines: safeMines };
                    this.startNewGame();
                });
            }
            
            startNewGame() {
                this.stopTimer();
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.flags = 0;
                this.timer = 0;
                this.startTime = null;
                this.grid = [];
                
                this.updateBestTimeDisplay();
                const { rows, cols, mines } = this.difficulties[this.currentDifficulty];
                
                this.mineCountDisplay.textContent = mines.toString().padStart(3, '0');
                this.timerDisplay.textContent = '000';
                this.newGameBtn.textContent = '😊';
                this.messageDisplay.classList.add('hidden');
                
                // Update board size - use auto-sizing to match cell dimensions
                const cellSize = window.innerWidth <= 800 ? 28 : 32;
                this.board.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
                this.board.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
                
                // Clear board
                this.board.innerHTML = '';
                
                // Create grid
                for (let r = 0; r < rows; r++) {
                    const row = [];
                    for (let c = 0; c < cols; c++) {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        // Left click
                        cell.addEventListener('click', () => this.handleLeftClick(r, c));
                        
                        // Right click
                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            this.handleRightClick(r, c);
                        });
                        
                        this.board.appendChild(cell);
                        row.push({
                            element: cell,
                            isMine: false,
                            isRevealed: false,
                            isFlagged: false,
                            neighborMines: 0
                        });
                    }
                    this.grid.push(row);
                }
            }
            
            startTimer() {
                this.startTime = Date.now();
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    this.timer = Math.min(elapsed, 999);
                    this.timerDisplay.textContent = this.timer.toString().padStart(3, '0');
                }, 100); // More frequent update for better responsiveness
            }
            
            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
            }
            
            placeMines(excludeRow, excludeCol) {
                const { rows, cols, mines } = this.difficulties[this.currentDifficulty];
                let minesPlaced = 0;
                
                while (minesPlaced < mines) {
                    const r = Math.floor(Math.random() * rows);
                    const c = Math.floor(Math.random() * cols);
                    
                    // Don't place mine on first click or its neighbors
                    const isExcluded = Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1;
                    
                    if (!this.grid[r][c].isMine && !isExcluded) {
                        this.grid[r][c].isMine = true;
                        minesPlaced++;
                    }
                }
                
                // Calculate neighbor counts
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!this.grid[r][c].isMine) {
                            this.grid[r][c].neighborMines = this.countNeighborMines(r, c);
                        }
                    }
                }
            }
            
            countNeighborMines(row, col) {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                let count = 0;
                
                for (let r = Math.max(0, row - 1); r <= Math.min(rows - 1, row + 1); r++) {
                    for (let c = Math.max(0, col - 1); c <= Math.min(cols - 1, col + 1); c++) {
                        if (r !== row || c !== col) {
                            if (this.grid[r][c].isMine) count++;
                        }
                    }
                }
                
                return count;
            }
            
            handleLeftClick(row, col) {
                if (this.gameOver || this.gameWon || this.grid[row][col].isFlagged) {
                    return;
                }

                if (this.grid[row][col].isRevealed) {
                    this.chord(row, col);
                    return;
                }
                
                if (this.firstClick) {
                    this.firstClick = false;
                    this.placeMines(row, col);
                    this.startTimer();
                }
                
                this.revealCell(row, col);
                this.checkWin();
            }
            
            handleRightClick(row, col) {
                if (this.gameOver || this.gameWon || this.grid[row][col].isRevealed) {
                    return;
                }
                
                // Add haptic feedback if supported
                if ('vibrate' in navigator) {
                    navigator.vibrate(50);
                }

                const cell = this.grid[row][col];
                cell.isFlagged = !cell.isFlagged;
                
                if (cell.isFlagged) {
                    cell.element.classList.add('flagged');
                    this.flags++;
                } else {
                    cell.element.classList.remove('flagged');
                    this.flags--;
                }
                
                this.mineCountDisplay.textContent = Math.max(0, this.difficulties[this.currentDifficulty].mines - this.flags).toString().padStart(3, '0');
            }

            chord(row, col) {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                const cell = this.grid[row][col];

                if (!cell.isRevealed || cell.neighborMines === 0) return;

                let flagCount = 0;
                const neighbors = [];

                for (let r = Math.max(0, row - 1); r <= Math.min(rows - 1, row + 1); r++) {
                    for (let c = Math.max(0, col - 1); c <= Math.min(cols - 1, col + 1); c++) {
                        if (r === row && c === col) continue;

                        if (this.grid[r][c].isFlagged) {
                            flagCount++;
                        } else if (!this.grid[r][c].isRevealed) {
                            neighbors.push({ r, c });
                        }
                    }
                }

                if (flagCount === cell.neighborMines) {
                    neighbors.forEach(n => this.revealCell(n.r, n.c));
                    this.checkWin();
                }
            }
            
            revealCell(row, col) {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                
                // Check bounds
                if (row < 0 || row >= rows || col < 0 || col >= cols) return;
                
                const cell = this.grid[row][col];
                
                if (cell.isRevealed || cell.isFlagged) return;
                
                cell.isRevealed = true;
                cell.element.classList.add('revealed');
                
                if (cell.isMine) {
                    cell.element.classList.add('mine');
                    if (this.firstClick === false) { // Not first click
                        cell.element.classList.add('exploded');
                    }
                    this.endGame(false);
                    return;
                }
                
                if (cell.neighborMines > 0) {
                    cell.element.textContent = cell.neighborMines;
                    cell.element.dataset.number = cell.neighborMines;
                } else {
                    // Flood fill for empty cells
                    for (let r = Math.max(0, row - 1); r <= Math.min(rows - 1, row + 1); r++) {
                        for (let c = Math.max(0, col - 1); c <= Math.min(cols - 1, col + 1); c++) {
                            if (r !== row || c !== col) {
                                this.revealCell(r, c);
                            }
                        }
                    }
                }
            }
            
            checkWin() {
                const { rows, cols, mines } = this.difficulties[this.currentDifficulty];
                let revealedCount = 0;
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (this.grid[r][c].isRevealed) revealedCount++;
                    }
                }
                
                if (revealedCount === (rows * cols) - mines) {
                    this.endGame(true);
                }
            }
            
            endGame(won) {
                this.gameOver = true;
                this.stopTimer();
                
                if (won) {
                    this.gameWon = true;
                    this.newGameBtn.textContent = '😎';
                    const isNewBest = this.saveBestTime(this.timer);
                    this.messageDisplay.textContent = `🎉 You won in ${this.timer} seconds!${isNewBest ? ' NEW BEST!' : ''}`;
                    this.messageDisplay.className = 'message success';
                    this.flagAllMines();
                } else {
                    this.newGameBtn.textContent = '😵';
                    this.messageDisplay.textContent = '💥 Game Over! Better luck next time.';
                    this.messageDisplay.className = 'message game-over';
                    this.revealAllMines();
                }
                
                this.messageDisplay.classList.remove('hidden');
            }
            
            revealAllMines() {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (this.grid[r][c].isMine) {
                            this.grid[r][c].element.classList.add('revealed', 'mine');
                        }
                    }
                }
            }
            
            flagAllMines() {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (this.grid[r][c].isMine && !this.grid[r][c].isFlagged) {
                            this.grid[r][c].element.classList.add('flagged');
                        }
                    }
                }
            }
        }

        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new Minesweeper();
        });
    </script>
</body>
</html>
