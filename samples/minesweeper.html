<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 90vw;
            width: 95%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .difficulty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .difficulty-selector label {
            font-weight: bold;
            color: #555;
        }

        #difficulty {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #difficulty:hover {
            border-color: #764ba2;
        }

        #difficulty:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .game-info {
            display: flex;
            gap: 30px;
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 10px;
        }

        .info-item {
            display: flex;
            gap: 5px;
            font-weight: bold;
            color: #333;
        }

        #timer {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        #new-game-btn {
            margin-bottom: 20px;
        }

        .game-board {
            display: grid;
            border: 4px solid #667eea;
            border-radius: 8px;
            margin: 20px auto;
            justify-content: center;
            user-select: none;
            overflow: auto;
            max-width: 100%;
            background: #667eea;
        }

        .cell {
            min-width: 30px;
            min-height: 30px;
            background: #667eea;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid rgba(255,255,255,0.3);
            box-sizing: border-box;
        }

        .cell:hover:not(.revealed):not(.disabled) {
            background: #7689f5;
            border-width: 2px;
        }

        .cell.revealed {
            background: #e0e0e0;
            cursor: default;
            border: 1px solid #bbb;
            box-sizing: border-box;
        }

        .cell.flagged::before {
            content: '🚩';
            font-size: 1.2rem;
            outline: none;
        }

        .cell.mine {
            background: #ff4757;
            color: white;
        }

        .cell.mine::before {
            content: '💣';
            font-size: 1.2rem;
        }

        .cell.exploded {
            background: #ff6b6b !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Number colors */
        .cell[data-number="1"] { color: #1e90ff; }
        .cell[data-number="2"] { color: #2ecc71; }
        .cell[data-number="3"] { color: #e74c3c; }
        .cell[data-number="4"] { color: #9b59b6; }
        .cell[data-number="5"] { color: #f39c12; }
        .cell[data-number="6"] { color: #00bcd4; }
        .cell[data-number="7"] { color: #795548; }
        .cell[data-number="8"] { color: #9e9e9e; }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: #2ecc71;
            color: white;
        }

        .message.game-over {
            background: #ff4757;
            color: white;
        }

        .message.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 800px) {
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
                gap: 15px;
            }
            
            .game-info {
                flex-direction: column;
                gap: 10px;
            }
            
            .cell {
                min-width: 27px;
                min-height: 27px;
                font-size: 0.9rem;
                border: 1px solid rgba(255,255,255,0.3);
            }
            
            .game-container {
                padding: 15px;
            }
            
            .game-container {
                padding: 15px;
            }
            
            .cell.mine::before, .cell.flagged::before {
                font-size: 1rem;
            }
            
            .cell:hover:not(.revealed):not(.disabled) {
                border-width: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Minesweeper</h1>
        
        <div class="controls">
            <div class="difficulty-selector">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy (9x9, 10 mines)</option>
                    <option value="medium">Medium (16x16, 40 mines)</option>
                    <option value="hard">Hard (30x16, 99 mines)</option>
                </select>
            </div>
            
            <div class="game-info">
                <div class="info-item">
                    <span>Mines:</span>
                    <span id="mine-count">0</span>
                </div>
                <div class="info-item">
                    <span>Time:</span>
                    <span id="timer">000</span>
                </div>
            </div>
        </div>
        
        <button id="new-game-btn" class="btn">New Game</button>
        
        <div id="game-board" class="game-board"></div>
        
        <div id="message" class="message hidden"></div>
    </div>

    <script>
        class Minesweeper {
            constructor() {
                this.board = document.getElementById('game-board');
                this.mineCountDisplay = document.getElementById('mine-count');
                this.timerDisplay = document.getElementById('timer');
                this.messageDisplay = document.getElementById('message');
                this.newGameBtn = document.getElementById('new-game-btn');
                this.difficultySelect = document.getElementById('difficulty');
                
                this.difficulties = {
                    easy: { rows: 9, cols: 9, mines: 10 },
                    medium: { rows: 16, cols: 16, mines: 40 },
                    hard: { rows: 16, cols: 30, mines: 99 }
                };
                
                this.currentDifficulty = 'easy';
                this.grid = [];
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.flags = 0;
                this.timer = 0;
                this.timerInterval = null;
                
                this.setupEventListeners();
                this.startNewGame();
            }
            
            setupEventListeners() {
                this.newGameBtn.addEventListener('click', () => this.startNewGame());
                this.difficultySelect.addEventListener('change', (e) => {
                    this.currentDifficulty = e.target.value;
                    this.startNewGame();
                });
            }
            
            startNewGame() {
                this.stopTimer();
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.flags = 0;
                this.timer = 0;
                this.grid = [];
                
                const { rows, cols, mines } = this.difficulties[this.currentDifficulty];
                
                this.mineCountDisplay.textContent = mines;
                this.timerDisplay.textContent = '000';
                this.messageDisplay.classList.add('hidden');
                
                // Update board size - use auto-sizing to match cell dimensions
                this.board.style.gridTemplateColumns = `repeat(${cols}, 32px)`;
                this.board.style.gridTemplateRows = `repeat(${rows}, 32px)`;
                
                // Clear board
                this.board.innerHTML = '';
                
                // Create grid
                for (let r = 0; r < rows; r++) {
                    const row = [];
                    for (let c = 0; c < cols; c++) {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        // Left click
                        cell.addEventListener('click', () => this.handleLeftClick(r, c));
                        
                        // Right click
                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            this.handleRightClick(r, c);
                        });
                        
                        this.board.appendChild(cell);
                        row.push({
                            element: cell,
                            isMine: false,
                            isRevealed: false,
                            isFlagged: false,
                            neighborMines: 0
                        });
                    }
                    this.grid.push(row);
                }
            }
            
            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.timer++;
                    this.timerDisplay.textContent = this.timer.toString().padStart(3, '0');
                }, 1000);
            }
            
            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
            }
            
            placeMines(excludeRow, excludeCol) {
                const { rows, cols, mines } = this.difficulties[this.currentDifficulty];
                let minesPlaced = 0;
                
                while (minesPlaced < mines) {
                    const r = Math.floor(Math.random() * rows);
                    const c = Math.floor(Math.random() * cols);
                    
                    // Don't place mine on first click or its neighbors
                    const isExcluded = Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1;
                    
                    if (!this.grid[r][c].isMine && !isExcluded) {
                        this.grid[r][c].isMine = true;
                        minesPlaced++;
                    }
                }
                
                // Calculate neighbor counts
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!this.grid[r][c].isMine) {
                            this.grid[r][c].neighborMines = this.countNeighborMines(r, c);
                        }
                    }
                }
            }
            
            countNeighborMines(row, col) {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                let count = 0;
                
                for (let r = Math.max(0, row - 1); r <= Math.min(rows - 1, row + 1); r++) {
                    for (let c = Math.max(0, col - 1); c <= Math.min(cols - 1, col + 1); c++) {
                        if (r !== row || c !== col) {
                            if (this.grid[r][c].isMine) count++;
                        }
                    }
                }
                
                return count;
            }
            
            handleLeftClick(row, col) {
                if (this.gameOver || this.gameWon || this.grid[row][col].isFlagged || this.grid[row][col].isRevealed) {
                    return;
                }
                
                if (this.firstClick) {
                    this.firstClick = false;
                    this.placeMines(row, col);
                    this.startTimer();
                }
                
                this.revealCell(row, col);
                this.checkWin();
            }
            
            handleRightClick(row, col) {
                if (this.gameOver || this.gameWon || this.grid[row][col].isRevealed) {
                    return;
                }
                
                const cell = this.grid[row][col];
                cell.isFlagged = !cell.isFlagged;
                
                if (cell.isFlagged) {
                    cell.element.classList.add('flagged');
                    this.flags++;
                } else {
                    cell.element.classList.remove('flagged');
                    this.flags--;
                }
                
                this.mineCountDisplay.textContent = this.difficulties[this.currentDifficulty].mines - this.flags;
            }
            
            revealCell(row, col) {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                
                // Check bounds
                if (row < 0 || row >= rows || col < 0 || col >= cols) return;
                
                const cell = this.grid[row][col];
                
                if (cell.isRevealed || cell.isFlagged) return;
                
                cell.isRevealed = true;
                cell.element.classList.add('revealed');
                
                if (cell.isMine) {
                    cell.element.classList.add('mine');
                    if (this.firstClick === false) { // Not first click
                        cell.element.classList.add('exploded');
                    }
                    this.endGame(false);
                    return;
                }
                
                if (cell.neighborMines > 0) {
                    cell.element.textContent = cell.neighborMines;
                    cell.element.dataset.number = cell.neighborMines;
                } else {
                    // Flood fill for empty cells
                    for (let r = Math.max(0, row - 1); r <= Math.min(rows - 1, row + 1); r++) {
                        for (let c = Math.max(0, col - 1); c <= Math.min(cols - 1, col + 1); c++) {
                            if (r !== row || c !== col) {
                                this.revealCell(r, c);
                            }
                        }
                    }
                }
            }
            
            checkWin() {
                const { rows, cols, mines } = this.difficulties[this.currentDifficulty];
                let revealedCount = 0;
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (this.grid[r][c].isRevealed) revealedCount++;
                    }
                }
                
                if (revealedCount === (rows * cols) - mines) {
                    this.endGame(true);
                }
            }
            
            endGame(won) {
                this.gameOver = true;
                this.stopTimer();
                
                if (won) {
                    this.gameWon = true;
                    this.messageDisplay.textContent = `🎉 You won in ${this.timer} seconds!`;
                    this.messageDisplay.className = 'message success';
                    this.flagAllMines();
                } else {
                    this.messageDisplay.textContent = '💥 Game Over! Better luck next time.';
                    this.messageDisplay.className = 'message game-over';
                    this.revealAllMines();
                }
                
                this.messageDisplay.classList.remove('hidden');
            }
            
            revealAllMines() {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (this.grid[r][c].isMine) {
                            this.grid[r][c].element.classList.add('revealed', 'mine');
                        }
                    }
                }
            }
            
            flagAllMines() {
                const { rows, cols } = this.difficulties[this.currentDifficulty];
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (this.grid[r][c].isMine && !this.grid[r][c].isFlagged) {
                            this.grid[r][c].element.classList.add('flagged');
                        }
                    }
                }
            }
        }

        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new Minesweeper();
        });
    </script>
</body>
</html>
